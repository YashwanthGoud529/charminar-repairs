<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Circle (Smooth Premium Solid White for theme compatibility) -->
  <circle cx="256" cy="256" r="240" fill="#ffffff" />

  <!-- Icon Group scaled and centered -->
  <g transform="translate(-64, -96) scale(3.2)">
    <!-- Swoosh -->
    <path d="M 145 65 A 70 70 0 1 0 80 175" fill="none" stroke="#ff7000" stroke-width="8" stroke-linecap="round" />
    
    <!-- Roof -->
    <path d="M 55 95 L 100 55 L 145 95" fill="none" stroke="#002d62" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Window -->
    <rect x="92" y="73" width="6" height="6" fill="#002d62" />
    <rect x="102" y="73" width="6" height="6" fill="#002d62" />
    <rect x="92" y="83" width="6" height="6" fill="#002d62" />
    <rect x="102" y="83" width="6" height="6" fill="#002d62" />
    
    <!-- M: Left Navy Column -->
    <path d="M 65 110 L 77 110 L 77 170 Q 65 170 65 158 Z" fill="#002d62" />
    
    <!-- M: Navy Diagonal -->
    <polygon points="77,110 93,170 105,170 89,110" fill="#002d62" />
    
    <!-- M: Orange Diagonal -->
    <polygon points="93,170 120,125 132,125 105,170" fill="#ff7000" />
    
    <!-- M: Orange Column -->
    <rect x="120" y="125" width="22" height="45" fill="#ff7000" />
    
    <!-- Wrench Silhouette inside Orange Column -->
    <line x1="123" y1="165" x2="131" y2="142" stroke="#ffffff" stroke-width="5" stroke-linecap="round" />
    <circle cx="131" cy="142" r="7.5" fill="#ffffff" />
    <line x1="131" y1="142" x2="138" y2="135" stroke="#ff7000" stroke-width="4.5" stroke-linecap="round" />
  </g>
</svg>
